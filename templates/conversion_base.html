<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="conv-nav">
  <div class="conv-nav-inner">
    <a href="/" class="nav-logo">
      <svg width="18" height="18" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M11 1 C11 1 12.2 7.5 11 11 C9.8 14.5 11 21 11 21" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
        <path d="M1 11 C1 11 7.5 9.8 11 11 C14.5 12.2 21 11 21 11" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
        <circle cx="11" cy="11" r="2" fill="#0066cc"/>
      </svg>
      AgentEval
    </a>
    <span style="font-size:14px;color:var(--color-subtle);">{% block step_indicator %}{% endblock %}</span>
  </div>
</nav>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" style="width: {% block progress %}0{% endblock %}%;"></div>
</div>

<main style="padding: 56px 0 80px;">
  {% block content %}{% endblock %}
</main>

<div style="text-align:center;padding:24px;font-size:13px;color:var(--color-subtle);border-top:1px solid var(--color-rule);">
  Questions? <a href="mailto:hello@agenteval.com">hello@agenteval.com</a>
</div>

</body>
</html>
